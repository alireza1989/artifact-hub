name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check (typecheck + biome lint/format)
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # The LLM eval job (PLAN §5.4) is added in Phase 4, guarded by ANTHROPIC_API_KEY
  # secret availability and scoped to PRs touching lib/ai/ or core/ai/.
