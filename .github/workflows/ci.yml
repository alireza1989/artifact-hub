name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Integration tests (PLAN §6) run against a real Postgres service container.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: artifact_hub
          POSTGRES_PASSWORD: artifact_hub
          POSTGRES_DB: artifact_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U artifact_hub -d artifact_hub_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      TEST_DATABASE_URL: postgres://artifact_hub:artifact_hub@localhost:5432/artifact_hub_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check (typecheck + biome lint/format)
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # LLM eval (PLAN §5.4): runs on PRs that touch the AI code, and only when the
  # ANTHROPIC_API_KEY secret is configured (it spends tokens). Skips gracefully
  # otherwise so forks and unconfigured repos still get a green CI.
  eval:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect AI changes
        id: filter
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            | grep -qE '^src/(lib|core)/ai/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.filter.outputs.changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.changed == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.filter.outputs.changed == 'true'

      - name: Eval (guarded by API key)
        if: steps.filter.outputs.changed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not configured; skipping eval."
            exit 0
          fi
          pnpm eval
